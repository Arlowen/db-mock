name: dbmock
services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: dbmock
      POSTGRES_USER: dbmock
      POSTGRES_PASSWORD: ${DBMOCK_POSTGRES_PASSWORD:?set DBMOCK_POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbmock -d dbmock"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [dbmock]

  dbmock:
    image: ${DBMOCK_IMAGE:-ghcr.io/arlowen/db-mock:latest}
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      args:
        VERSION: ${DBMOCK_VERSION:-dev}
    restart: unless-stopped
    stop_grace_period: 4m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DBMOCK_LISTEN_ADDRESS: :8080
      DBMOCK_DATABASE_URL: postgres://dbmock:${DBMOCK_POSTGRES_PASSWORD}@postgres:5432/dbmock?sslmode=disable
      DBMOCK_PUBLIC_URL: ${DBMOCK_PUBLIC_URL:-http://localhost:8080}
      DBMOCK_TRUSTED_PROXIES: ${DBMOCK_TRUSTED_PROXIES:-}
      DBMOCK_ARTIFACT_DIR: /var/lib/dbmock/artifacts
      DBMOCK_MASTER_KEY_FILE: /var/lib/dbmock/master.key
      DBMOCK_TIMEZONE: ${DBMOCK_TIMEZONE:-Asia/Shanghai}
      DBMOCK_SESSION_DURATION: ${DBMOCK_SESSION_DURATION:-720h}
      DBMOCK_MAX_UPLOAD_BYTES: ${DBMOCK_MAX_UPLOAD_BYTES:-53687091200}
      DBMOCK_TASK_WORKERS: ${DBMOCK_TASK_WORKERS:-4}
      DBMOCK_TLS_CERT_FILE: ${DBMOCK_TLS_CERT_FILE:-}
      DBMOCK_TLS_KEY_FILE: ${DBMOCK_TLS_KEY_FILE:-}
    ports:
      - "${DBMOCK_BIND_ADDRESS:-0.0.0.0}:${DBMOCK_PORT:-8080}:8080"
    volumes:
      - dbmock_data:/var/lib/dbmock
      - ${DBMOCK_TLS_DIR:-./tls}:/etc/dbmock/tls:ro
    networks: [dbmock]

volumes:
  postgres_data:
  dbmock_data:

networks:
  dbmock:
