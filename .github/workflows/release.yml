name: Release images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    runs-on: ubuntu-latest
    outputs:
      image-name: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve canonical image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  offline-bundles:
    if: startsWith(github.ref, 'refs/tags/')
    needs: image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build offline ${{ matrix.architecture }} bundle
        env:
          DBMOCK_IMAGE: ${{ needs.image.outputs.image-name }}:${{ github.ref_name }}
        run: ./scripts/package-offline.sh "${{ github.ref_name }}" "${{ matrix.architecture }}"
      - uses: actions/upload-artifact@v7
        with:
          name: offline-${{ matrix.architecture }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  release-assets:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [image, offline-bundles]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: offline-*
          path: release-assets
          merge-multiple: true
      - name: Generate bundle checksums
        working-directory: release-assets
        run: sha256sum dbmock-*.tar.gz > SHA256SUMS
      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || gh release create "${{ github.ref_name }}" --generate-notes
          gh release upload "${{ github.ref_name }}" release-assets/* --clobber
