name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify repository layout
        working-directory: .
        run: ./scripts/ci/verify-layout.sh
      - name: Go tests
        run: go test -race ./...
      - name: Verify Go formatting
        run: test -z "$(gofmt -l cmd internal web)"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build

  compose-e2e:
    runs-on: ubuntu-latest
    env:
      DBMOCK_POSTGRES_PASSWORD: ci-only-password
      DBMOCK_IMAGE: dbmock:e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Start the complete stack
        run: docker compose -f deploy/compose.yaml up --build -d
      - name: Wait for health
        run: |
          for attempt in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8080/api/v1/health && exit 0
            sleep 2
          done
          docker compose -f deploy/compose.yaml logs
          exit 1
      - name: Browser smoke test
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run test:e2e
      - name: Collect service logs
        if: failure()
        run: docker compose -f deploy/compose.yaml logs
      - name: Stop stack
        if: always()
        run: docker compose -f deploy/compose.yaml down -v

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
          work-dir: backend
          go-package: ./...
