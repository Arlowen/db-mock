name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Go tests
        run: go test -race ./...
      - name: Frontend tests and production build
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build
      - name: Verify repository is formatted
        run: test -z "$(gofmt -l cmd internal web)"

  compose-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Start the complete stack
        env:
          DBMOCK_POSTGRES_PASSWORD: ci-only-password
          DBMOCK_IMAGE: dbmock:e2e
        run: docker compose up --build -d
      - name: Wait for health
        run: |
          for attempt in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8080/api/v1/health && exit 0
            sleep 2
          done
          docker compose logs
          exit 1
      - name: Browser smoke test
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run test:e2e
      - name: Collect service logs
        if: failure()
        run: docker compose logs
      - name: Stop stack
        if: always()
        run: docker compose down -v

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
