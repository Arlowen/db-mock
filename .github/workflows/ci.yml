name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify repository layout
        working-directory: .
        run: ./scripts/ci/verify-layout.sh
      - name: Verify delivery helpers
        working-directory: .
        run: |
          sh -n scripts/*.sh scripts/ci/*.sh
          python3 -m unittest discover -s scripts/ci -p 'test_*.py'
          if ./scripts/package-offline.sh '../invalid' amd64 >/dev/null 2>&1; then exit 1; fi
          if ./scripts/package-offline.sh v0.1.0 riscv64 >/dev/null 2>&1; then exit 1; fi
      - name: Go tests
        run: go test -race ./...
      - name: Verify Go formatting
        run: test -z "$(gofmt -l cmd internal web)"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build

  compose-e2e:
    runs-on: ubuntu-latest
    env:
      DBMOCK_POSTGRES_PASSWORD: ci-only-password
      DBMOCK_IMAGE: dbmock:e2e
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Start the complete stack
        run: docker compose -f deploy/compose.yaml up --build -d
      - name: Wait for health
        run: |
          for attempt in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8080/api/v1/health && exit 0
            sleep 2
          done
          docker compose -f deploy/compose.yaml logs
          exit 1
      - name: Browser smoke test
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run test:e2e
      - name: Collect service logs
        if: failure()
        run: docker compose -f deploy/compose.yaml logs
      - name: Stop stack
        if: always()
        run: docker compose -f deploy/compose.yaml down -v

  multi-arch-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64
      - uses: docker/setup-buildx-action@v4
      - name: Build amd64 and arm64 OCI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          outputs: type=oci,dest=${{ runner.temp }}/dbmock-multiarch.tar
          tags: dbmock:ci
          build-args: VERSION=ci-${{ github.sha }}
          cache-from: type=gha,scope=multi-arch-image
          cache-to: type=gha,mode=max,scope=multi-arch-image
      - name: Verify OCI platform index
        run: python3 scripts/ci/verify-oci-platforms.py "${{ runner.temp }}/dbmock-multiarch.tar" linux/amd64 linux/arm64
      - name: Load the amd64 image for offline packaging
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          load: true
          tags: dbmock:offline-ci
          build-args: VERSION=ci-${{ github.sha }}
          cache-from: type=gha,scope=multi-arch-image
      - name: Build and verify the offline bundle
        env:
          DBMOCK_IMAGE: dbmock:offline-ci
          DBMOCK_OFFLINE_SKIP_PULL: 'true'
        run: |
          docker pull --platform linux/amd64 postgres:17-alpine
          ./scripts/package-offline.sh ci amd64
          ./scripts/ci/verify-offline-bundle.sh dist/dbmock-ci-linux-amd64-offline.tar.gz

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false
          go-version-input: '1.25.12'
          cache-dependency-path: backend/go.sum
          work-dir: backend
          go-package: ./...
